<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Coins & Duties{% endblock %}</title>
</head>
<body>

    <nav>
        {% if username %}
            Logged in as <strong>{{ username }}</strong> | <a href="/logout">Logout</a>
            {% if role == 'admin' %}
                | <a href="/admin/coins">Manage Coins</a>
                | <a href="/admin/duties">Manage Duties</a>
                
            {% endif %}
        {% else %}
            <a href="/login">Login</a>
        {% endif %}
    </nav>

    <hr>

    {% block content %}{% endblock %}

</body>
</html>
