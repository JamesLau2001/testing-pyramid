name: Deploy if pass tests

on:
  push:
    branches:
      - main 

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install JavaScript dependencies
        run: pnpm install

      - name: Approve Cypress install script
        run: pnpm approve-builds cypress

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12" 

      - name: Install docker-docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Set up backend env
        run: |
          echo "db_url='${{ secrets.DB_URL }}'" > backend/.env
      
      - name: Start Docker cluster
        run: docker-compose up -d --build

      - name: Wait for services to be ready
        run: sleep 15

      - name: Install Python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          source venv/bin/activate
          pytest tests/

      - name: Install Cypress
        run: pnpm exec cypress install

      - name: Cypress run
        uses: cypress-io/github-action@v6
        
      - name: Tear down cluster
        if: always()
        run: docker-compose down

    
  terraform:
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE }}
          aws-region: eu-north-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with: 
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        env:
          TF_VAR_DB_URL: ${{ secrets.DB_URL }}
        run: terraform plan -lock=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        env:
          TF_VAR_DB_URL: ${{ secrets.DB_URL }}
        run: terraform apply -auto-approve -lock=false

      


      